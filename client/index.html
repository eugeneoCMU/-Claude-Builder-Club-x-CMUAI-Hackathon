<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kintsugi Network</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh;
        background: #0e0500;
        overflow: hidden;
        font-family: "Georgia", "Cormorant Garamond", serif;
        color: #f5e6c8;
      }
      canvas {
        display: block;
        position: fixed;
        inset: 0;
      }
      #hud {
        position: fixed;
        bottom: 16px;
        left: 16px;
        z-index: 10;
        font-size: 13px;
        color: rgba(255, 215, 100, 0.65);
        pointer-events: none;
        letter-spacing: 0.05em;
        text-shadow: 0 0 6px rgba(0, 0, 0, 0.8);
      }
      #title {
        position: fixed;
        top: 20px;
        left: 24px;
        z-index: 10;
        font-size: 14px;
        letter-spacing: 0.3em;
        color: rgba(255, 215, 100, 0.45);
        pointer-events: none;
        text-transform: uppercase;
      }
      #overlay {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: none;
        pointer-events: none;
        background: radial-gradient(
          ellipse at center,
          rgba(0, 0, 0, 0) 20%,
          rgba(0, 0, 0, 0.55) 100%
        );
      }
      #empty {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        text-align: center;
        z-index: 15;
        pointer-events: none;
      }
      #empty .inner {
        max-width: 520px;
        padding: 0 24px;
        opacity: 0.7;
      }
      #empty h1 {
        font-size: 18px;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: rgba(255, 215, 100, 0.75);
        margin: 0 0 18px;
      }
      #empty p {
        font-size: 15px;
        line-height: 1.7;
        color: rgba(245, 230, 200, 0.7);
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div id="title">Kintsugi Network</div>
    <div id="hud"></div>
    <div id="overlay"></div>
    <div id="empty">
      <div class="inner">
        <h1>Awaiting the first shard</h1>
        <p>
          Add an entry to the spreadsheet (or <code>data/entries.csv</code>).
          The Council will reason through the reflection, the image will be
          kilned, and it will settle into the mosaic within a minute.
        </p>
      </div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
